<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>貨物パレット入力</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#eef2f7;--card:#fff;--ink:#0f172a;--muted:#64748b;--blue:#2563eb;--blue2:#1d4ed8;--red:#dc2626;--green:#15803d;--line:#cbd5e1;--soft:#e2e8f0;--amber:#d97706}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;overscroll-behavior:none}
button{touch-action:manipulation;user-select:none;-webkit-user-select:none}
.app{max-width:760px;margin:auto;padding:8px 10px 110px}
h1{font-size:19px;margin:4px 0 8px}
.card{background:var(--card);border-radius:16px;padding:10px;margin-bottom:8px;box-shadow:0 7px 22px rgba(15,23,42,.08)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.space{justify-content:space-between}
.tabs{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px}
.tab{border:0;border-radius:999px;padding:11px 16px;font-size:16px;font-weight:900;background:var(--soft);white-space:nowrap}
.tab.active{background:var(--blue);color:#fff}
.btn{border:0;border-radius:12px;padding:11px 13px;font-weight:900;background:var(--soft);color:var(--ink)}
.btn.primary{background:var(--blue);color:#fff}
.btn.dark{background:#0f172a;color:#fff}
.btn.red{background:#fee2e2;color:var(--red)}
.btn.green{background:#dcfce7;color:var(--green)}
.btn.amber{background:#ffedd5;color:#9a3412}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
.stat{border:1px solid var(--soft);border-radius:14px;padding:10px;text-align:center;background:#f8fafc}
.stat small{display:block;color:var(--muted);font-weight:800}
.stat strong{font-size:24px}
label{display:block;font-weight:900;margin-bottom:6px}
.field{width:100%;height:46px;border:2px solid var(--line);border-radius:13px;padding:8px 12px;font-size:19px;font-weight:900;background:#fff}
.field.active{border-color:var(--blue);box-shadow:0 0 0 3px #dbeafe}
.weight-wrap{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.unit{font-size:21px;font-weight:900}
.size-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.key{border:0;border-radius:12px;min-height:46px;font-size:19px;font-weight:950;background:var(--soft);box-shadow:0 3px 0 #cbd5e1;color:var(--ink)}
.key:active{transform:translateY(2px);box-shadow:0 1px 0 #cbd5e1}
.key.blue{background:var(--blue);color:#fff;box-shadow:0 3px 0 var(--blue2)}
.key.red{background:#fee2e2;color:var(--red);box-shadow:0 2px 0 #fecaca;font-size:13px}
.key.green{background:#dcfce7;color:var(--green);box-shadow:0 2px 0 #bbf7d0;font-size:13px}
.key.amber{background:#ffedd5;color:#9a3412;box-shadow:0 2px 0 #fed7aa;font-size:13px}
.key.battery.on{background:#facc15;color:#422006;box-shadow:0 3px 0 #eab308}
.hint{font-size:12px;color:var(--muted);line-height:1.5;margin-top:6px}
.msg{display:none;margin-top:10px;padding:10px 12px;border-radius:12px;font-weight:900}
.msg.show{display:block}.msg.ok{background:#dcfce7;color:var(--green)}.msg.err{background:#fee2e2;color:var(--red)}
.list{max-height:300px;overflow:auto;margin-top:10px;border-top:1px solid var(--soft)}
.item{display:grid;grid-template-columns:72px 1fr 38px;gap:8px;align-items:center;padding:10px 2px;border-bottom:1px solid var(--soft)}
.item .no{font-weight:950}.item .detail{font-size:14px}.batteryMark{font-size:11px;color:#92400e;font-weight:900}
.item button{border:0;border-radius:9px;background:#fee2e2;color:var(--red);font-weight:900;height:34px}
.empty{text-align:center;color:var(--muted);padding:20px}
.footer{position:fixed;left:0;right:0;bottom:0;padding:10px;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;gap:8px;justify-content:center;z-index:10}
.footer button{flex:1;max-width:250px;border:0;border-radius:14px;padding:14px;font-size:16px;font-weight:950}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:end;justify-content:center;z-index:30}
.modal.show{display:flex}.sheet{background:#fff;width:100%;max-width:760px;border-radius:20px 20px 0 0;padding:18px;max-height:80vh;overflow:auto}
.sheet h2{margin:0 0 12px}
@media(min-width:650px){.modal{align-items:center}.sheet{border-radius:20px}}

.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.quick-actions .key{min-height:42px;font-size:12px}
.register-wide{grid-column:span 2;font-size:16px!important}
.section-gap{height:7px!important}
@media(max-height:750px){.key{min-height:42px}.field{height:43px}.card{padding:8px}}

</style>
</head>
<body>
<main class="app">
<h1>貨物パレット入力</h1>

<section class="card">
  <div class="row space">
    <strong>入力中のパレット</strong>
    <div class="row">
      <button class="btn" id="renameBtn">名称変更</button>
      <button class="btn dark" id="addPalletBtn">＋追加</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="summary">
    <div class="stat"><small>登録個数</small><strong id="countView">0個</strong></div>
    <div class="stat"><small>貨物重量</small><strong id="weightView">0kg</strong></div>
  </div>
</section>

<section class="card">
  <label>パレットに載っている貨物の重量</label>
  <div class="weight-wrap">
    <input id="weight" class="field" readonly inputmode="none" placeholder="例 550.5">
    <span class="unit">kg</span>
  </div>
</section>

<section class="card">
  <label>ケースナンバー</label>
  <input id="caseNo" class="field active" readonly inputmode="none" placeholder="例 1-15.20.25-30">
  <div class="hint">「-」で範囲、「.」で区切り。例：1-15.20.25-30</div>

  <div class="section-gap"></div>
  <label>サイズ（cm）</label>
  <div class="size-grid">
    <div><small>L</small><input id="L" class="field" readonly inputmode="none"></div>
    <div><small>W</small><input id="W" class="field" readonly inputmode="none"></div>
    <div><small>H</small><input id="H" class="field" readonly inputmode="none"></div>
  </div>

  <div class="keypad" id="keypad">
    <button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
    <button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button>
    <button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button>
    <button class="key" data-k="-">−</button><button class="key" data-k="0">0</button><button class="key" data-k=".">.</button>
  </div>
  <div class="quick-actions" id="quickActions">
    <button class="key battery amber" id="batteryBtn" data-action="battery">電池</button>
    <button class="key green" data-action="same">前回と同じ</button>
    <button class="key red" data-action="back">⌫ 戻る</button>
    <button class="key amber" data-action="clear">クリア</button>
    <button class="key red" data-action="undo">直前削除</button>
    <button class="key blue register-wide" data-action="register">登録</button>
  </div>
  <div id="msg" class="msg"></div>
</section>

<section class="card">
  <div class="row space"><strong>登録済みケース</strong><button class="btn" id="allListBtn">全パレット表示</button></div>
  <div class="list" id="list"></div>
</section>
</main>

<div class="footer">
  <button class="dark" id="newBtn">新規作業</button>
  <button class="primary" id="excelBtn">Excel出力</button>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <div class="row space"><h2>全パレット一覧</h2><button class="btn" id="closeModal">閉じる</button></div>
    <div id="allList"></div>
  </div>
</div>

<script>
(()=>{
const KEY='cargo_skid_app_v3';
const $=s=>document.querySelector(s);
const els={tabs:$('#tabs'),weight:$('#weight'),caseNo:$('#caseNo'),L:$('#L'),W:$('#W'),H:$('#H'),count:$('#countView'),weightView:$('#weightView'),list:$('#list'),msg:$('#msg'),battery:$('#batteryBtn')};
let state=load()||{
  pallets:[
    {id:uid(),name:'Aパレット',weight:'',cases:[]},
    {id:uid(),name:'Bパレット',weight:'',cases:[]},
    {id:uid(),name:'Cパレット',weight:'',cases:[]}
  ],
  activeId:null,lastSize:null,lastRegistration:null
};
if(!state.activeId)state.activeId=state.pallets[0].id;
let activeField='caseNo',battery=false,saveTimer=null;

function uid(){return (crypto.randomUUID?crypto.randomUUID():Date.now()+'_'+Math.random())}
function active(){return state.pallets.find(p=>p.id===state.activeId)}
function save(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>localStorage.setItem(KEY,JSON.stringify(state)),70)}
function saveNow(){clearTimeout(saveTimer);localStorage.setItem(KEY,JSON.stringify(state))}
function load(){try{return JSON.parse(localStorage.getItem(KEY))}catch(e){return null}}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function numSort(a,b){return Number(a)-Number(b)}
function msg(t,type='ok'){els.msg.textContent=t;els.msg.className='msg show '+type;clearTimeout(msg.t);msg.t=setTimeout(()=>els.msg.className='msg',2000)}
function setActiveField(id){activeField=id;['caseNo','L','W','H','weight'].forEach(x=>$('#'+x).classList.toggle('active',x===id))}
['caseNo','L','W','H','weight'].forEach(id=>$('#'+id).addEventListener('click',()=>setActiveField(id)));

function render(){
  const p=active();
  els.tabs.replaceChildren();
  const frag=document.createDocumentFragment();
  state.pallets.forEach(x=>{
    const b=document.createElement('button');b.className='tab'+(x.id===state.activeId?' active':'');b.textContent=x.name;
    b.onclick=()=>{state.activeId=x.id;battery=false;save();render();setActiveField('caseNo')};frag.appendChild(b);
  });
  els.tabs.appendChild(frag);
  els.weight.value=p.weight||'';
  els.count.textContent=p.cases.length+'個';
  els.weightView.textContent=(p.weight||0)+'kg';
  els.battery.classList.toggle('on',battery);
  els.battery.textContent=battery?'電池 ON':'電池';
  renderList();
}
function renderList(){
  const p=active();els.list.replaceChildren();
  if(!p.cases.length){els.list.innerHTML='<div class="empty">まだ登録がありません</div>';return}
  const frag=document.createDocumentFragment();
  [...p.cases].sort((a,b)=>numSort(a.no,b.no)).forEach(c=>{
    const div=document.createElement('div');div.className='item';
    div.innerHTML=`<div class="no">NO.${esc(c.no)}</div><div class="detail">${esc(c.L)}×${esc(c.W)}×${esc(c.H)} cm ${c.battery?'<span class="batteryMark">電池</span>':''}</div><button data-no="${esc(c.no)}">削除</button>`;
    frag.appendChild(div);
  });
  els.list.appendChild(frag);
}
els.list.addEventListener('click',e=>{
  const b=e.target.closest('button[data-no]');if(!b)return;
  const no=b.dataset.no;if(confirm(`NO.${no}を削除しますか？`)){active().cases=active().cases.filter(c=>String(c.no)!==String(no));save();render()}
});

function appendKey(k){
  const el=$('#'+activeField);
  if(activeField!=='caseNo' && k==='-')return;
  if(activeField!=='caseNo' && k==='.') {
    if(activeField==='weight'&&!el.value.includes('.')) el.value+='.';
    return;
  }
  if(activeField==='caseNo'){
    if(k==='.'&&(!el.value||el.value.endsWith('.')||el.value.endsWith('-')))return;
    if(k==='-'&&(!el.value||el.value.endsWith('.')||el.value.endsWith('-')))return;
  }
  if(el.value.length<40)el.value+=k;
  if(activeField==='weight'){active().weight=el.value;els.weightView.textContent=(el.value||0)+'kg';save()}
}
function back(){
  const el=$('#'+activeField);el.value=el.value.slice(0,-1);
  if(activeField==='weight'){active().weight=el.value;els.weightView.textContent=(el.value||0)+'kg';save()}
}
function clearInputs(){els.caseNo.value='';els.L.value='';els.W.value='';els.H.value='';battery=false;render();setActiveField('caseNo')}
function usePrevious(){
  if(!state.lastSize)return msg('前回のサイズがありません','err');
  els.L.value=state.lastSize.L;els.W.value=state.lastSize.W;els.H.value=state.lastSize.H;
  msg(`前回サイズ ${state.lastSize.L}×${state.lastSize.W}×${state.lastSize.H} を入力しました`);
}
function parseCases(text){
  const clean=text.replace(/[、,，\s]+/g,'.').replace(/－|ー|–|—/g,'-');
  if(!clean)return[];
  const set=new Set();
  for(const part0 of clean.split('.')){
    const part=part0.trim();if(!part)continue;
    if(part.includes('-')){
      const bits=part.split('-');
      if(bits.length!==2||!bits[0]||!bits[1])throw new Error(`入力形式を確認してください：${part}`);
      const a=Number(bits[0]),b=Number(bits[1]);
      if(!Number.isInteger(a)||!Number.isInteger(b)||a<0||b<0||b<a)throw new Error(`範囲が正しくありません：${part}`);
      if(b-a>10000)throw new Error('一度に登録できる範囲が大きすぎます');
      for(let n=a;n<=b;n++)set.add(String(n));
    }else{
      const n=Number(part);if(!Number.isInteger(n)||n<0)throw new Error(`番号が正しくありません：${part}`);
      set.add(String(n));
    }
  }
  return [...set].sort(numSort);
}
function register(){
  const L=els.L.value,W=els.W.value,H=els.H.value;
  if(!els.caseNo.value)return msg('ケースナンバーを入力してください','err');
  if(!L||!W||!H)return msg('L・W・Hをすべて入力してください','err');
  let nos;try{nos=parseCases(els.caseNo.value)}catch(e){return msg(e.message,'err')}
  if(!nos.length)return msg('ケースナンバーを確認してください','err');
  const existing=new Map();
  state.pallets.forEach(p=>p.cases.forEach(c=>existing.set(String(c.no),p)));
  const dup=nos.filter(n=>existing.has(n));
  if(dup.length)return msg(`登録済み番号があります：${dup.slice(0,8).join('、')}${dup.length>8?'…':''}`,'err');
  const p=active();const added=[];
  nos.forEach(no=>{const c={no,L,W,H,battery};p.cases.push(c);added.push(no)});
  state.lastSize={L,W,H};
  state.lastRegistration={palletId:p.id,numbers:added};
  els.caseNo.value='';els.L.value='';els.W.value='';els.H.value='';battery=false;
  save();render();setActiveField('caseNo');navigator.vibrate?.(35);
  msg(`${p.name}へ${added.length}個登録しました`);
}
function undo(){
  const r=state.lastRegistration;if(!r||!r.numbers?.length)return msg('直前に登録したデータがありません','err');
  const p=state.pallets.find(x=>x.id===r.palletId);if(!p)return;
  if(!confirm(`${p.name}へ直前に登録した${r.numbers.length}個を削除しますか？`))return;
  const s=new Set(r.numbers.map(String));p.cases=p.cases.filter(c=>!s.has(String(c.no)));state.lastRegistration=null;save();render();msg('直前の登録を削除しました');
}

function handleKeyClick(e){
  const b=e.target.closest('button');if(!b)return;
  if(b.dataset.k!==undefined)return appendKey(b.dataset.k);
  const a=b.dataset.action;
  if(a==='battery'){battery=!battery;render()}
  else if(a==='back')back();
  else if(a==='same')usePrevious();
  else if(a==='undo')undo();
  else if(a==='clear')clearInputs();
  else if(a==='register')register();
}
$('#keypad').addEventListener('click',handleKeyClick);
$('#quickActions').addEventListener('click',handleKeyClick);
els.weight.addEventListener('click',()=>setActiveField('weight'));
$('#renameBtn').onclick=()=>{const p=active();const n=prompt('パレットの表示名',p.name);if(n?.trim()){p.name=n.trim();save();render()}};
$('#addPalletBtn').onclick=()=>{const n=prompt('追加するパレット名',String.fromCharCode(65+state.pallets.length)+'パレット');if(!n?.trim())return;const p={id:uid(),name:n.trim(),weight:'',cases:[]};state.pallets.push(p);state.activeId=p.id;save();render()};
$('#newBtn').onclick=()=>{if(confirm('すべての入力データを削除して新規作業を始めますか？')){localStorage.removeItem(KEY);location.reload()}};
$('#allListBtn').onclick=()=>{renderAll();$('#modal').classList.add('show')};
$('#closeModal').onclick=()=>$('#modal').classList.remove('show');
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')$('#modal').classList.remove('show')});

function renderAll(){
  const wrap=$('#allList');wrap.replaceChildren();
  state.pallets.forEach(p=>{
    const sec=document.createElement('section');sec.style.marginBottom='20px';
    let rows=[...p.cases].sort((a,b)=>numSort(a.no,b.no)).map(c=>`<div class="item"><div class="no">NO.${esc(c.no)}</div><div class="detail">${esc(c.L)}×${esc(c.W)}×${esc(c.H)} cm ${c.battery?'<span class="batteryMark">電池</span>':''}</div><div></div></div>`).join('');
    sec.innerHTML=`<h3>${esc(p.name)}　${p.cases.length}個　${esc(p.weight||0)}kg</h3><div class="list">${rows||'<div class="empty">登録なし</div>'}</div>`;
    wrap.appendChild(sec);
  });
}

function makeWorkbook(){
  if(typeof XLSX==='undefined')throw new Error('Excel作成ライブラリを読み込めません。通信状態を確認してください。');
  const all=[];
  state.pallets.forEach((p,pi)=>p.cases.forEach(c=>all.push({
    no:Number(c.no),pallet:p.name,palletOrder:pi,L:Number(c.L),W:Number(c.W),H:Number(c.H),battery:c.battery?'有':'',weight:Number(p.weight||0)
  })));

  const wb=XLSX.utils.book_new();

  // ケースNO.順
  const caseRows=[['ケースNO.','パレット','L(cm)','W(cm)','H(cm)','電池']];
  [...all].sort((a,b)=>a.no-b.no).forEach(x=>caseRows.push([x.no,x.pallet,x.L,x.W,x.H,x.battery]));
  const ws1=XLSX.utils.aoa_to_sheet(caseRows);
  ws1['!cols']=[{wch:12},{wch:18},{wch:10},{wch:10},{wch:10},{wch:7}];
  ws1['!autofilter']={ref:`A1:F${Math.max(1,caseRows.length)}`};
  ws1['!freeze']={xSplit:0,ySplit:1};
  ws1['!margins']={left:.3,right:.3,top:.5,bottom:.5,header:.2,footer:.2};
  ws1['!pageSetup']={paperSize:9,orientation:'portrait',fitToWidth:1,fitToHeight:0};
  XLSX.utils.book_append_sheet(wb,ws1,'ケースNO順');

  // パレット順
  const palletRows=[['パレット別サイズ一覧','','','','','']];
  state.pallets.forEach(p=>{
    palletRows.push([]);
    palletRows.push([p.name,'個数',p.cases.length,'貨物重量(kg)',Number(p.weight||0),'']);
    palletRows.push(['ケースNO.','L(cm)','W(cm)','H(cm)','電池','']);
    [...p.cases].sort((a,b)=>numSort(a.no,b.no)).forEach(c=>palletRows.push([Number(c.no),Number(c.L),Number(c.W),Number(c.H),c.battery?'有':'','']));
  });
  const totalWeight=state.pallets.reduce((s,p)=>s+Number(p.weight||0),0);
  const totalCases=state.pallets.reduce((s,p)=>s+p.cases.length,0);
  palletRows.push([]);
  palletRows.push(['全パレット合計','総個数',totalCases,'重量合計(kg)',totalWeight,'']);
  const ws2=XLSX.utils.aoa_to_sheet(palletRows);
  ws2['!cols']=[{wch:18},{wch:12},{wch:12},{wch:15},{wch:12},{wch:5}];
  ws2['!margins']={left:.3,right:.3,top:.5,bottom:.5,header:.2,footer:.2};
  ws2['!pageSetup']={paperSize:9,orientation:'portrait',fitToWidth:1,fitToHeight:0};
  XLSX.utils.book_append_sheet(wb,ws2,'パレット順');

  // 重量集計
  const sumRows=[['パレット','個数','貨物重量(kg)']];
  state.pallets.forEach(p=>sumRows.push([p.name,p.cases.length,Number(p.weight||0)]));
  sumRows.push(['合計',totalCases,totalWeight]);
  const ws3=XLSX.utils.aoa_to_sheet(sumRows);
  ws3['!cols']=[{wch:22},{wch:12},{wch:18}];
  ws3['!autofilter']={ref:`A1:C${sumRows.length}`};
  XLSX.utils.book_append_sheet(wb,ws3,'重量集計');
  return wb;
}
$('#excelBtn').onclick=()=>{
  try{
    saveNow();
    const count=state.pallets.reduce((s,p)=>s+p.cases.length,0);
    if(!count&&!confirm('ケースが未登録です。このままExcelを出力しますか？'))return;
    const wb=makeWorkbook();
    const d=new Date(),pad=n=>String(n).padStart(2,'0');
    XLSX.writeFile(wb,`貨物パレット明細_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.xlsx`);
    msg('Excelを出力しました');
  }catch(e){msg(e.message||'Excel出力に失敗しました','err')}
};

// iPhoneの連続タップ拡大防止
let lastTouch=0;
document.addEventListener('touchend',e=>{const now=Date.now();if(now-lastTouch<300&&e.target.closest('button'))e.preventDefault();lastTouch=now},{passive:false});
document.addEventListener('dblclick',e=>{if(e.target.closest('button'))e.preventDefault()},{passive:false});

render();setActiveField('caseNo');
})();
</script>
