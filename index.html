<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>貨物パレット積付明細</title>
  <style>
    :root{
      --bg:#f1f5f9; --card:#ffffff; --ink:#0f172a; --muted:#64748b;
      --accent:#2563eb; --accent2:#1d4ed8; --danger:#dc2626; --ok:#15803d;
      --line:#cbd5e1; --soft:#e2e8f0;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
      background:var(--bg); color:var(--ink); min-height:100vh;
    }
    .app{max-width:760px;margin:0 auto;padding:14px 14px 110px}
    h1{font-size:22px;margin:4px 0 14px}
    h2{font-size:18px;margin:0}
    .card{
      background:var(--card); border-radius:18px; padding:16px; margin-bottom:14px;
      box-shadow:0 8px 25px rgba(15,23,42,.08);
    }
    .tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px}
    .tab{
      border:0;border-radius:999px;padding:12px 18px;font-weight:800;font-size:16px;
      background:var(--soft);color:var(--ink);white-space:nowrap;
    }
    .tab.active{background:var(--accent);color:white}
    .tab.add{background:#0f172a;color:#fff}
    .summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .stat{background:#f8fafc;border:1px solid var(--soft);border-radius:14px;padding:12px;text-align:center}
    .stat small{display:block;color:var(--muted);font-weight:700;margin-bottom:4px}
    .stat strong{font-size:25px}
    .input-display{
      width:100%;height:64px;border:2px solid var(--line);border-radius:14px;
      font-size:30px;font-weight:900;text-align:center;letter-spacing:2px;background:#fff;
    }
    .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
    .key{
      border:0;border-radius:16px;min-height:64px;font-size:25px;font-weight:900;
      background:#e2e8f0;color:var(--ink);box-shadow:0 3px 0 #cbd5e1;
    }
    .key:active{transform:translateY(2px);box-shadow:0 1px 0 #cbd5e1}
    .key.action{background:var(--accent);color:white;box-shadow:0 3px 0 var(--accent2)}
    .key.danger{background:#fee2e2;color:var(--danger);box-shadow:0 3px 0 #fecaca}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    button.small{
      border:0;border-radius:12px;padding:11px 13px;font-weight:800;background:#e2e8f0;color:var(--ink)
    }
    button.primary{background:var(--accent);color:white}
    button.red{background:#fee2e2;color:var(--danger)}
    button.dark{background:#0f172a;color:white}
    .numbers{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;max-height:260px;overflow:auto}
    .chip{
      border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;
      border-radius:999px;padding:8px 12px;font-weight:800
    }
    .chip button{border:0;background:transparent;color:var(--danger);font-weight:900;margin-left:6px}
    label{font-weight:800;display:block;margin-bottom:7px}
    .weight-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
    .weight-input{
      width:100%;padding:14px;border:2px solid var(--line);border-radius:14px;
      font-size:24px;font-weight:900;text-align:right
    }
    .kg{font-size:22px;font-weight:900}
    .message{margin-top:10px;padding:10px 12px;border-radius:12px;font-weight:800;display:none}
    .message.show{display:block}
    .message.ok{background:#dcfce7;color:var(--ok)}
    .message.err{background:#fee2e2;color:var(--danger)}
    .footerbar{
      position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);
      backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:10px;
      display:flex;gap:8px;justify-content:center;z-index:20
    }
    .footerbar button{flex:1;max-width:240px;border:0;border-radius:14px;padding:14px;font-weight:900;font-size:16px}
    .print-preview{display:none}
    .muted{color:var(--muted);font-size:13px;line-height:1.6}
    .section-title{display:flex;justify-content:space-between;align-items:center;gap:8px}
    @media print{
      body{background:white}
      .app,.footerbar{display:none!important}
      .print-preview{display:block;padding:28px 34px;color:#000;font-family:"Yu Gothic","Noto Sans JP",sans-serif}
      .print-preview h1{text-align:center;font-size:24px;margin-bottom:32px}
      .print-preview h2{font-size:24px;margin:18px 0 28px}
      .print-grid{font-size:20px;line-height:2}
      .print-grid .label{display:inline-block;width:190px}
      .print-nos{margin-top:24px;font-size:18px;line-height:1.8;word-break:break-all}
      .print-nos strong{display:block;font-size:20px;margin-bottom:8px}
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>貨物パレット積付明細</h1>

    <section class="card">
      <div class="section-title">
        <h2>パレット選択</h2>
        <button class="small dark" id="renameBtn">名称変更</button>
      </div>
      <div class="tabs" id="tabs"></div>
      <div class="summary">
        <div class="stat"><small>個数</small><strong id="count">0個</strong></div>
        <div class="stat"><small>トータル重量</small><strong id="weightDisplay">0kg</strong></div>
      </div>
    </section>

    <section class="card">
      <label for="numberInput">積付貨物NO.</label>
      <input id="numberInput" class="input-display" inputmode="none" readonly aria-label="貨物番号" />
      <div class="keypad" id="keypad">
        <button class="key" data-key="1">1</button>
        <button class="key" data-key="2">2</button>
        <button class="key" data-key="3">3</button>
        <button class="key" data-key="4">4</button>
        <button class="key" data-key="5">5</button>
        <button class="key" data-key="6">6</button>
        <button class="key" data-key="7">7</button>
        <button class="key" data-key="8">8</button>
        <button class="key" data-key="9">9</button>
        <button class="key danger" data-key="back">⌫</button>
        <button class="key" data-key="0">0</button>
        <button class="key action" data-key="enter">登録</button>
      </div>
      <div id="message" class="message"></div>
      <div class="toolbar">
        <button class="small red" id="undoBtn">直前を取消</button>
        <button class="small" id="sortBtn">番号を昇順</button>
        <button class="small red" id="clearBtn">このパレットを全削除</button>
      </div>
    </section>

    <section class="card">
      <label for="weightInput">トータル重量</label>
      <div class="weight-row">
        <input id="weightInput" class="weight-input" type="number" inputmode="decimal" min="0" step="0.1" placeholder="550" />
        <span class="kg">kg</span>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>登録済み貨物NO.</h2>
        <span class="muted">番号を押すと削除</span>
      </div>
      <div class="numbers" id="numbers"></div>
      <p class="muted">入力内容は端末内へ自動保存されます。ブラウザを閉じても続きから再開できます。</p>
    </section>
  </main>

  <div class="footerbar">
    <button class="dark" id="newBtn">新規作業</button>
    <button class="primary" id="printBtn">明細を印刷・PDF</button>
  </div>

  <section class="print-preview" id="printPreview">
    <h1>貨物パレット積付明細</h1>
    <h2 id="printName">Aパレット</h2>
    <div class="print-grid">
      <div><span class="label">個数</span><strong id="printCount">0個</strong></div>
      <div><span class="label">トータル重量</span><strong id="printWeight">0kg</strong></div>
    </div>
    <div class="print-nos">
      <strong>積付貨物NO.</strong>
      <span id="printNumbers">なし</span>
    </div>
  </section>

<script>
(() => {
  const STORAGE_KEY = 'cargoPalletApp_v1';
  let state = load() || {
    pallets: [
      {id: crypto.randomUUID(), name:'Aパレット', numbers:[], weight:''},
      {id: crypto.randomUUID(), name:'Bパレット', numbers:[], weight:''},
      {id: crypto.randomUUID(), name:'Cパレット', numbers:[], weight:''}
    ],
    activeId: null
  };
  if (!state.activeId && state.pallets[0]) state.activeId = state.pallets[0].id;

  const $ = s => document.querySelector(s);
  const tabs = $('#tabs'), input = $('#numberInput'), numbers = $('#numbers');
  const count = $('#count'), weightDisplay = $('#weightDisplay'), weightInput = $('#weightInput');
  const message = $('#message');

  function active(){ return state.pallets.find(p=>p.id===state.activeId); }
  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  function showMessage(text, type='ok'){
    message.textContent = text; message.className = `message show ${type}`;
    clearTimeout(showMessage.t); showMessage.t = setTimeout(()=>message.className='message',1800);
  }
  function render(){
    tabs.innerHTML = '';
    state.pallets.forEach(p=>{
      const b=document.createElement('button');
      b.className='tab'+(p.id===state.activeId?' active':'');
      b.textContent=p.name;
      b.onclick=()=>{state.activeId=p.id;save();render();};
      tabs.appendChild(b);
    });
    const add=document.createElement('button');
    add.className='tab add'; add.textContent='＋追加';
    add.onclick=()=>{
      const letter = String.fromCharCode(65 + state.pallets.length);
      const name = prompt('パレット名を入力してください', `${letter}パレット`);
      if(!name) return;
      const p={id:crypto.randomUUID(),name:name.trim(),numbers:[],weight:''};
      state.pallets.push(p);state.activeId=p.id;save();render();
    };
    tabs.appendChild(add);

    const p=active();
    if(!p) return;
    count.textContent=`${p.numbers.length}個`;
    weightInput.value=p.weight;
    weightDisplay.textContent=`${p.weight || 0}kg`;
    numbers.innerHTML='';
    [...p.numbers].sort((a,b)=>Number(a)-Number(b)).forEach(n=>{
      const chip=document.createElement('button');
      chip.className='chip'; chip.textContent=n;
      chip.onclick=()=>{
        if(confirm(`NO.${n}を削除しますか？`)){
          p.numbers=p.numbers.filter(x=>x!==n);save();render();
        }
      };
      numbers.appendChild(chip);
    });
    updatePrint();
  }

  function addNumber(){
    const raw=input.value.trim();
    if(!raw) return showMessage('番号を入力してください','err');
    const normalized=String(Number(raw));
    if(raw.length>1 && Number(raw)===0) return showMessage('正しい番号を入力してください','err');
    if(active().numbers.includes(normalized)){
      navigator.vibrate?.([150,80,150]);
      input.value='';
      return showMessage(`NO.${normalized}は登録済みです`,'err');
    }
    const duplicate=state.pallets.find(p=>p.id!==state.activeId && p.numbers.includes(normalized));
    if(duplicate){
      navigator.vibrate?.([150,80,150]);
      return showMessage(`NO.${normalized}は${duplicate.name}に登録済みです`,'err');
    }
    active().numbers.push(normalized);
    input.value='';
    navigator.vibrate?.(40);
    save();render();
    showMessage(`NO.${normalized}を登録しました`);
  }

  $('#keypad').addEventListener('click',e=>{
    const k=e.target.dataset.key;if(!k)return;
    if(k==='back') input.value=input.value.slice(0,-1);
    else if(k==='enter') addNumber();
    else if(input.value.length<8) input.value+=k;
  });

  weightInput.addEventListener('input',()=>{
    active().weight=weightInput.value;
    save();weightDisplay.textContent=`${weightInput.value || 0}kg`;updatePrint();
  });

  $('#undoBtn').onclick=()=>{
    const p=active(); if(!p.numbers.length) return showMessage('取消する番号がありません','err');
    const n=p.numbers.pop();save();render();showMessage(`NO.${n}を取り消しました`);
  };
  $('#sortBtn').onclick=()=>{
    active().numbers.sort((a,b)=>Number(a)-Number(b));save();render();showMessage('昇順に並べ替えました');
  };
  $('#clearBtn').onclick=()=>{
    if(confirm(`${active().name}の番号と重量をすべて削除しますか？`)){
      active().numbers=[];active().weight='';save();render();showMessage('削除しました');
    }
  };
  $('#renameBtn').onclick=()=>{
    const p=active();const n=prompt('新しいパレット名',p.name);
    if(n){p.name=n.trim();save();render();}
  };
  $('#newBtn').onclick=()=>{
    if(confirm('全パレットの入力内容を削除して新規作業を始めますか？')){
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }
  };
  $('#printBtn').onclick=()=>{updatePrint();window.print();};

  function formatNumbers(arr){
    return [...arr].sort((a,b)=>Number(a)-Number(b)).join('、') || 'なし';
  }
  function updatePrint(){
    const p=active(); if(!p)return;
    $('#printName').textContent=p.name;
    $('#printCount').textContent=`${p.numbers.length}個`;
    $('#printWeight').textContent=`${p.weight || 0}kg`;
    $('#printNumbers').textContent=formatNumbers(p.numbers);
  }
  function load(){
    try{return JSON.parse(localStorage.getItem(STORAGE_KEY));}catch(e){return null;}
  }
  render();
})();
</script>
</body>
</html>
